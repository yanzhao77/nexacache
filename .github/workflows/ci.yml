name: CI — Build & Test

on:
  push:
    branches: [ "master", "main", "develop" ]
    paths-ignore:
      - "doc/**"
      - "*.md"
      - ".gitignore"
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    name: Build & Test (JDK ${{ matrix.java }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java: [ "25" ]

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: "temurin"
          cache: "maven"

      - name: Build & run all tests
        run: mvn clean verify --batch-mode --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-jdk${{ matrix.java }}
          path: |
            **/target/surefire-reports/
            **/target/failsafe-reports/
          retention-days: 14

      - name: Publish test summary
        if: always()
        run: |
          echo "## ✅ Test Results (JDK ${{ matrix.java }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          # 汇总所有模块的测试结果
          TOTAL=0; FAILED=0; SKIPPED=0
          for f in $(find . -path "*/surefire-reports/TEST-*.xml" 2>/dev/null); do
            T=$(grep -oP 'tests="\K[0-9]+' "$f" | head -1 || echo 0)
            F=$(grep -oP 'failures="\K[0-9]+' "$f" | head -1 || echo 0)
            S=$(grep -oP 'skipped="\K[0-9]+' "$f" | head -1 || echo 0)
            TOTAL=$((TOTAL + T))
            FAILED=$((FAILED + F))
            SKIPPED=$((SKIPPED + S))
          done
          PASSED=$((TOTAL - FAILED - SKIPPED))
          echo "| 指标 | 数量 |"
          echo "|---|---|"
          echo "| 总用例数 | $TOTAL |"
          echo "| 通过 | $PASSED |"
          echo "| 失败 | $FAILED |"
          echo "| 跳过 | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          if [ "$FAILED" -gt 0 ]; then
            echo "❌ $FAILED test(s) failed!"
            exit 1
          else
            echo "✅ All $PASSED tests passed!"
          fi
